<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Buddha Story</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <section class="screen intro-screen active" id="introScreen">
      <div class="hero">
        <div class="buddha">
          <div class="head"></div>
          <div class="body"></div>
          <div class="left-arm"></div>
          <div class="right-arm"></div>
          <div class="halo"></div>
        </div>
      </div>
      <div class="intro-copy">
        <h1>Cyber Buddha Stories</h1>
        <p>Tap start to listen to a calm story with word-by-word highlighting.</p>
      </div>
      <button class="primary-button" id="startButton">Start</button>
    </section>

    <section class="screen story-screen" id="storyScreen">
      <header class="toolbar">
        <button class="icon-button" id="backButton" aria-label="Back">←</button>
        <div class="toolbar-title">Story Time</div>
        <button class="icon-button" id="fullscreenButton" aria-label="Full screen">⛶</button>
      </header>

      <main class="story-content">
        <div class="story-card">
          <div class="story-text" id="storyText"></div>
        </div>
      </main>

      <div class="controls-panel">
        <div class="voices">
          <label class="voice-toggle">
            <input type="radio" name="voiceGender" value="female" checked />
            Female
          </label>
          <label class="voice-toggle">
            <input type="radio" name="voiceGender" value="male" />
            Male
          </label>
        </div>

        <div class="playback-row">
          <button class="icon-button" id="playButton" aria-label="Play">▶</button>
          <button class="icon-button hidden" id="pauseButton" aria-label="Pause">❚❚</button>
          <button class="secondary-button" id="speedButton">Speed: 1.0x</button>
          <button class="icon-button" id="volumeButton" aria-label="Volume">🔊</button>
        </div>

        <div class="extra-controls hidden" id="speedOptions">
          <button class="speed-option" data-speed="0.75">0.75x</button>
          <button class="speed-option active" data-speed="1">1.0x</button>
          <button class="speed-option" data-speed="1.25">1.25x</button>
          <button class="speed-option" data-speed="1.5">1.5x</button>
        </div>

        <div class="volume-control hidden" id="volumeControl">
          <input type="range" min="0" max="1" step="0.05" value="1" id="volumeSlider" />
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
