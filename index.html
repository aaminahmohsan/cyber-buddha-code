<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stories of the Buddha</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <section class="screen intro-screen active" id="introScreen">
      <div class="hero">
        <div class="buddha" aria-hidden="true">
          <div class="bun"></div>
          <div class="hair"></div>
          <div class="head">
            <span class="eye eye-left"></span>
            <span class="eye eye-right"></span>
            <span class="eyebrow eyebrow-left"></span>
            <span class="eyebrow eyebrow-right"></span>
            <span class="nose"></span>
            <span class="lips"></span>
          </div>
          <div class="body"></div>
          <div class="robe"></div>
          <div class="left-arm"></div>
          <div class="right-arm"></div>
          <div class="ushnisha"></div>
        </div>
      </div>

      <div class="intro-copy">
        <h1>Stories of the Buddha</h1>
        <p>Welcome to a calm meditation experience where the story is read with gentle care.</p>
      </div>

      <button class="primary-button" id="startButton">Start</button>
    </section>

    <section class="screen story-screen" id="storyScreen">
      <header class="toolbar">
        <button class="icon-button" id="backButton" aria-label="Back">←</button>
        <div class="toolbar-title">Mindful Story</div>
        <button class="icon-button" id="fullscreenButton" aria-label="Full screen">⛶</button>
      </header>

      <main class="story-content">
        <div class="story-card">
          <div class="story-text" id="storyText"></div>
        </div>
      </main>

      <div class="controls-panel">
        <div class="playback-row">
          <button class="play-toggle" id="playButton" aria-label="Play">▶</button>
          <button class="play-toggle hidden" id="pauseButton" aria-label="Pause">❚❚</button>

          <div class="progress-block">
            <div class="progress-meta">
              <span id="progressText">0:00 / 0:00</span>
              <span id="speedLabel">1.0x</span>
            </div>
            <input type="range" id="progressSlider" min="0" max="100" step="1" value="0" />
          </div>
        </div>

        <div class="control-grid">
          <label class="control-card">
            <span>Voice</span>
            <select id="voiceSelect">
              <option value="female">Female Voice</option>
              <option value="male">Male Voice</option>
            </select>
          </label>

          <label class="control-card">
            <span>Speed</span>
            <select id="speedSelect">
              <option value="0.5">0.5x</option>
              <option value="0.75">0.75x</option>
              <option value="1" selected>1.0x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2.0x</option>
            </select>
          </label>

          <label class="control-card">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="100" />
          </label>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
